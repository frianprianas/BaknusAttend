persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log

# ✅ Penting: Izinkan Masuk Tanpa Password (untuk unit di sekolah Mas)
allow_anonymous true

# ✅ Penting: Port MQTT Biasa
listener 1883 0.0.0.0

# ✅ Port WebSockets (Kalau butuh liat dari browser mas)
listener 9001
protocol websockets
